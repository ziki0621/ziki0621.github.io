# Render static site configuration
# Deploy manually: connect GitHub repo → New Static Site → select this repo
# OR use Render Blueprint with this file

services:
  - type: web
    name: ziqi-website
    runtime: static
    buildCommand: ""
    staticPublishPath: .
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
